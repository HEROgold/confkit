name: Bump Version By Labels

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version
        id: bump-version
        uses: conjikidow/bump-version@v2.0.0
        with:
          label-major: 'Major'
          label-minor: 'Minor'
          label-patch: 'Patch'
          create-release: 'false'

      - name: Auto-merge pull request
        if: steps.bump-version.outputs.version-bumped == 'true'
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug outputs
        run: |
          echo "version-bumped=${{ steps.bump-version.outputs.version-bumped }}"
          echo "new-version=${{ steps.bump-version.outputs.new-version }}"

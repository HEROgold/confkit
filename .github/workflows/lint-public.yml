name: Type Check Public API

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: lint-public-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name : Install dependencies
        run: uv sync --dev

  lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: ruff
            args: "check ./examples"
          - tool: ty
            args: "check ./examples --ignore no-matching-overload"
          - tool: pyrefly
            args: "check ./examples"
          - tool: zuban
            args: "check ./examples"
          - tool: mypy
            args: "./examples"
          - tool: pyright
            args: "./examples"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv (Should be cached from setup job)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache lint results
        uses: actions/cache@v4
        with:
          path: .lint_cache
          key: ${{ runner.os }}-lint-${{matrix.tool}}-${{ hashFiles('**/tests/**/*.py', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-lint-${{matrix.tool}}

      - name: Run type checking - ${{matrix.tool}}
        run: uv add ${{matrix.tool}} && uv run ${{matrix.tool}} ${{matrix.args}}
